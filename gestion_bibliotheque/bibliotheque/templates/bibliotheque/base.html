<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📚 BiblioTech</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0a0a0a;
      color: #f0f0f0;
      min-height: 100vh;
    }

    nav {
      background: linear-gradient(90deg, #111 0%, #1a1a1a 100%);
      border-bottom: 2px solid #ff6600;
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    nav .logo {
      font-size: 1.5rem;
      font-weight: bold;
      color: #ff6600;
      text-decoration: none;
      letter-spacing: 2px;
    }

    nav a {
      color: #ccc;
      text-decoration: none;
      margin-left: 1.5rem;
      transition: color 0.3s;
    }

    nav a:hover { color: #ff6600; }

    .btn {
      display: inline-block;
      padding: 0.6rem 1.5rem;
      border-radius: 25px;
      border: none;
      cursor: pointer;
      font-weight: bold;
      text-decoration: none;
      transition: all 0.3s ease;
      background: linear-gradient(90deg, #111 0%, #ff6600 100%);
      color: #fff;
    }

    .btn:hover {
      background: #ff6600;
      box-shadow: 0 0 15px #ff660080;
      transform: scale(1.03);
    }

    main { padding: 2rem; max-width: 1400px; margin: 0 auto; }

    h1, h2 { color: #ff6600; margin-bottom: 1rem; }

    .card {
      background: #161616;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 1.2rem;
      transition: all 0.3s ease;
    }

    .card:hover {
      border-color: #ff6600;
      box-shadow: 0 0 20px #ff660040;
      transform: translateY(-3px);
    }

    input, select {
      background: #1a1a1a;
      border: 1px solid #444;
      color: #f0f0f0;
      padding: 0.5rem 1rem;
      border-radius: 8px;
      outline: none;
      transition: border 0.3s;
    }

    input:focus, select:focus { border-color: #ff6600; }

    .badge {
      background: linear-gradient(90deg, #111, #ff6600);
      color: white;
      padding: 2px 10px;
      border-radius: 20px;
      font-size: 0.75rem;
      margin: 2px;
      display: inline-block;
    }

    .disponible { color: #00e676; font-weight: bold; }
    .indisponible { color: #f44336; font-weight: bold; }
  </style>
</head>
<body>
  {% if user.is_authenticated %}
  <nav>
    <a href="{% url 'accueil' %}" class="logo">📚 BiblioTech</a>
    <div>
      <a href="{% url 'accueil' %}">Accueil</a>
      <a href="{% url 'liste_livres' %}">Livres</a>
      <span style="color:#ff6600; margin-left:1.5rem">👤 {{ user.username }}</span>
      <a href="{% url 'deconnexion' %}" style="margin-left:1rem">Déconnexion</a>
    </div>
  </nav>
  {% endif %}
  <main>{% block content %}{% endblock %}</main>
</body>
</html>
